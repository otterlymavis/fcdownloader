name: NoBrowser Go Regression

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: Optional public YouTube URL for live formats regression
        required: false
        type: string
  schedule:
    - cron: "17 4 * * 2"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      FCDL_YOUTUBE_TEST_URL: ${{ inputs.youtube_url || secrets.FCDL_YOUTUBE_TEST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop-companion/package-lock.json

      - name: Install companion dependencies
        working-directory: desktop-companion
        run: npm ci

      - name: Build NoBrowser Go companion
        working-directory: desktop-companion
        run: npm run variants:nobrowser-go

      - name: Run helper smoke tests
        working-directory: desktop-companion
        run: npm run test:nobrowser-go

      - name: Run installer smoke test
        working-directory: desktop-companion
        run: npm run test:nobrowser-go:installer

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nobrowser-go-regression-${{ github.run_number }}
          path: |
            artifacts/nobrowser-go-tests/**
            artifacts/nobrowser-go-test-cache/logs/**
            desktop-companion/dist-nobrowser-go-ver/*.exe
          if-no-files-found: ignore
          retention-days: 14
