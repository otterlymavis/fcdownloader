name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125" "platforms;android-35"

      - name: Install dependencies
        run: npm ci

      - name: Revert gradle-plugin toolchain requirement to 17 for CI
        run: |
          grep -rl "jvmToolchain(18)\|VERSION_18" node_modules/@react-native/gradle-plugin/ | \
            xargs sed -i \
              -e 's/jvmToolchain(18)/jvmToolchain(17)/g' \
              -e 's/JavaVersion\.VERSION_18/JavaVersion.VERSION_17/g'

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore fcdownloader.keystore \
            -alias fcdownloader \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=FCDownloader, OU=Dev, O=FCDownloader, L=City, ST=State, C=US" \
            -storepass android \
            -keypass android

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=../fcdownloader.keystore \
            -PMYAPP_UPLOAD_KEY_ALIAS=fcdownloader \
            -PMYAPP_UPLOAD_STORE_PASSWORD=android \
            -PMYAPP_UPLOAD_KEY_PASSWORD=android
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FCDownloader-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
