name: Build Android APK

# Triggers:
#   - push to either branch → builds whichever branch was pushed
#   - manual trigger from the Actions tab → builds the branch you select
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   RELEASE_KEYSTORE_BASE64      (required)
#                                base64-encoded release keystore. Generate with:
#                                  base64 -w0 android/app/fcdownloader.keystore | clip
#                                on Windows PowerShell:
#                                  [Convert]::ToBase64String([IO.File]::ReadAllBytes(
#                                    "android\app\fcdownloader.keystore")) | Set-Clipboard
#
#   EXPO_PUBLIC_EXTRACTOR_URL    (optional)
#                                Fly.io backend URL for the HD extractor. Only used
#                                when building the `backend-version` or `plus-version`
#                                branch. Leave unset for master-only builds.

on:
  push:
    branches: [master, backend-version, plus-version]
    paths-ignore:
      - '**.md'
      - 'server/**'
      - '.gitignore'
  workflow_dispatch:

# Force Node.js 24 for all JavaScript actions. GitHub is migrating from
# Node.js 20 → 24 starting June 2026; enabling this now avoids broken
# action tarball downloads during the transition window.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK (${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''   # Gradle will pull just what build.gradle requests

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'package-lock.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install npm deps
        run: npm ci

      # Older RN gradle-plugin assumes JDK 18 toolchain; CI has JDK 21. Patch
      # in-place rather than installing a 4th JDK.
      - name: Patch RN gradle-plugin toolchain to JDK 21
        run: |
          grep -rl "jvmToolchain(18)\|VERSION_18" node_modules/@react-native/gradle-plugin/ | \
            xargs sed -i \
              -e 's/jvmToolchain(18)/jvmToolchain(21)/g' \
              -e 's/JavaVersion\.VERSION_18/JavaVersion.VERSION_21/g'

      - name: Restore release keystore
        env:
          KS: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not set. See README/workflow header for setup."
            exit 1
          fi
          echo "$KS" | base64 -d > android/app/fcdownloader.keystore
          ls -l android/app/fcdownloader.keystore

      - name: Inline server URL into .env.local (backend-version and plus-version)
        if: github.ref_name == 'backend-version' || github.ref_name == 'plus-version'
        env:
          EXTRACTOR_URL: ${{ secrets.EXPO_PUBLIC_EXTRACTOR_URL }}
        run: |
          if [ -n "$EXTRACTOR_URL" ]; then
            echo "EXPO_PUBLIC_EXTRACTOR_URL=$EXTRACTOR_URL" > .env.local
            echo "wrote .env.local (length=$(wc -c < .env.local))"
          else
            echo "::warning::EXPO_PUBLIC_EXTRACTOR_URL secret missing; HD extractor will be disabled in this build"
          fi

      - name: Ensure gradlew is executable
        # Windows-tracked gradlew arrives without the +x bit on Linux runners.
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        env:
          # Expo's Metro inlines EXPO_PUBLIC_* env vars at bundle time. Belt-and-
          # suspenders alongside the .env.local file above.
          EXPO_PUBLIC_EXTRACTOR_URL: ${{ secrets.EXPO_PUBLIC_EXTRACTOR_URL }}
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m'
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            -PreactNativeArchitectures=arm64-v8a,armeabi-v7a

      - name: Show APK info + capture version
        id: apkinfo
        run: |
          ls -lh android/app/build/outputs/apk/release/
          file android/app/build/outputs/apk/release/app-release.apk || true
          # Pull versionName from build.gradle so the artifact label matches
          # the version baked into the APK rather than just the workflow run #.
          VERSION=$(grep -oE 'versionName "[^"]+"' android/app/build.gradle | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Built FCDownloader v$VERSION ($SHORT_SHA, run #${{ github.run_number }})"

      - name: Rename APK with version + sha
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/fcdownloader-v${{ steps.apkinfo.outputs.version }}-${{ steps.apkinfo.outputs.short_sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          # Self-describing name: branch + version + short SHA + run #. Tells
          # you at a glance which APK is newer when you have several downloaded.
          name: fcdownloader-${{ github.ref_name }}-v${{ steps.apkinfo.outputs.version }}-${{ steps.apkinfo.outputs.short_sha }}-r${{ github.run_number }}
          path: android/app/build/outputs/apk/release/fcdownloader-v${{ steps.apkinfo.outputs.version }}-${{ steps.apkinfo.outputs.short_sha }}.apk
          retention-days: 30
          if-no-files-found: error
