name: Release Web

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pack:
    name: Pack static web hub
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      EXTRACTOR_URL: ${{ secrets.EXPO_PUBLIC_EXTRACTOR_URL }}
      MOBILE_DOWNLOAD_URL: ${{ vars.MOBILE_DOWNLOAD_URL }}
      EXTENSION_DOWNLOAD_URL: ${{ vars.EXTENSION_DOWNLOAD_URL }}
      COMPANION_DOWNLOAD_URL: ${{ vars.COMPANION_DOWNLOAD_URL }}
      SELF_HOST_URL: ${{ vars.SELF_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm deps
        run: npm ci

      - name: Bake public URLs
        run: npm run bake:web

      - name: Pack web directory
        run: |
          cd web
          zip -r ../fcdownloader-web.zip .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcdownloader-web-${{ github.run_number }}
          path: fcdownloader-web.zip
          retention-days: 90

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "FCDownloader $tag" --notes "FCDownloader release bundle."
          gh release upload "$tag" fcdownloader-web.zip --clobber
