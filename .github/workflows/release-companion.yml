name: Release Companion

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Companion (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.COMPANION_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.COMPANION_CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop-companion/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: desktop-companion/helper-requirements.txt

      - name: Install companion dependencies
        working-directory: desktop-companion
        run: npm ci

      - name: Build installer
        working-directory: desktop-companion
        run: npm run dist

      - name: Build NoBrowser Go companion
        if: runner.os == 'Windows'
        working-directory: desktop-companion
        run: npm run variants:nobrowser-go

      - name: Smoke test NoBrowser Go helper
        if: runner.os == 'Windows'
        working-directory: desktop-companion
        run: npm run test:nobrowser-go

      - name: Smoke test NoBrowser Go installer
        if: runner.os == 'Windows'
        working-directory: desktop-companion
        run: npm run test:nobrowser-go:installer

      - name: Generate artifact checksums
        working-directory: desktop-companion
        run: |
          npm run release:hash-artifacts
          npm run release:verify-artifacts

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: fcdownloader-companion-${{ runner.os }}-${{ github.run_number }}
          path: |
            desktop-companion/dist/*.exe
            desktop-companion/dist/*.dmg
            desktop-companion/dist/*.blockmap
            desktop-companion/dist/latest*.yml
            desktop-companion/dist-nobrowser-go-ver/*.exe
            desktop-companion/build/companion-artifacts.json
            desktop-companion/build/companion-artifacts.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "FCDownloader $tag" --notes "FCDownloader release bundle."
          find desktop-companion/dist -maxdepth 1 \( -name '*.exe' -o -name '*.dmg' -o -name '*.blockmap' -o -name 'latest*.yml' \) -print0 \
            | xargs -0 -I{} gh release upload "$tag" "{}" --clobber
          if [ -d desktop-companion/dist-nobrowser-go-ver ]; then
            find desktop-companion/dist-nobrowser-go-ver -maxdepth 1 -name '*.exe' -print0 \
              | xargs -0 -r -I{} gh release upload "$tag" "{}" --clobber
          fi
          gh release upload "$tag" desktop-companion/build/companion-artifacts.json desktop-companion/build/companion-artifacts.sha256 --clobber
