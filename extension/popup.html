<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FCDownloader</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">FCDownloader</div>
    <button id="settings-btn" type="button" aria-label="Settings" title="Settings">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h.1A1.7 1.7 0 0 0 10 3.1V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v.1a1.7 1.7 0 0 0 1.5 1H21a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/>
      </svg>
    </button>
  </header>

  <main>
    <p id="page-info" class="page"></p>

    <!-- Primary card â€” the single best detection -->
    <section id="primary" hidden>
      <h2 id="primary-title">Media</h2>
      <p id="primary-meta" class="meta"></p>
      <button id="primary-download" class="primary" type="button">Download</button>
    </section>

    <!-- Empty / fallback state -->
    <section id="empty">
      <p class="empty-text">Looking for media on this page...€¦</p>
      <button id="extract-btn" class="ghost" type="button">Find media</button>
    </section>

    <div id="status" hidden></div>

    <!-- "More media" â€” collapsed by default, only shown when extras exist -->
    <details id="more" hidden>
      <summary>Show other media</summary>
      <ul id="more-list"></ul>
    </details>
  </main>

  <footer>
    <a href="https://github.com/otterlymavis/fcdownloader" target="_blank" rel="noopener">Help</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
