<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FCDownloader Companion</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0f1215;
      color: #f3f5f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f1215;
    }

    main {
      width: min(360px, calc(100vw - 32px));
      display: grid;
      gap: 16px;
      padding: 24px;
      border: 1px solid #252d35;
      border-radius: 18px;
      background: #161b20;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    .brand {
      display: grid;
      gap: 8px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 24px;
      color: #aeb8c2;
      font-size: 13px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #d15d5d;
      box-shadow: 0 0 0 4px rgba(209, 93, 93, 0.12);
    }

    .dot.ready {
      background: #57bd7e;
      box-shadow: 0 0 0 4px rgba(87, 189, 126, 0.14);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button {
      min-height: 40px;
      border: 1px solid #303943;
      border-radius: 10px;
      background: #202832;
      color: #f3f5f7;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s, border-color 0.12s, background 0.12s;
    }

    button:hover {
      border-color: #465566;
      background: #27313b;
    }

    button:active {
      transform: scale(0.98);
    }

    button.primary {
      background: #f3f5f7;
      border-color: #f3f5f7;
      color: #11161b;
    }

    button.primary:hover {
      background: #ffffff;
    }

    .log-panel {
      display: none;
      overflow: hidden;
      border: 1px solid #252d35;
      border-radius: 12px;
      background: #0b0e11;
    }

    .log-panel.open {
      display: block;
    }

    pre {
      margin: 0;
      height: 160px;
      padding: 12px;
      overflow: auto;
      color: #cbd4dc;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <section class="brand" aria-label="Companion status">
      <h1>FCDownloader Companion</h1>
      <div class="status">
        <span id="dot" class="dot"></span>
        <span id="statusText">Stopped</span>
      </div>
    </section>

    <div class="actions">
      <button id="startBtn" class="primary" type="button">Start</button>
      <button id="stopBtn" type="button">Stop</button>
      <button id="logBtn" type="button">Log</button>
    </div>

    <section id="logPanel" class="log-panel" aria-label="Helper log">
      <pre id="log"></pre>
    </section>
  </main>

  <script>
    const dot = document.getElementById("dot");
    const statusText = document.getElementById("statusText");
    const logButton = document.getElementById("logBtn");
    const logPanel = document.getElementById("logPanel");
    const logBox = document.getElementById("log");

    function renderStatus(state) {
      const healthy = Boolean(state && state.healthy);
      const running = Boolean(state && state.running);
      dot.classList.toggle("ready", healthy);
      statusText.textContent = healthy ? "Ready" : running ? "Starting" : "Stopped";
    }

    function appendLog(line) {
      logBox.textContent += line;
      logBox.scrollTop = logBox.scrollHeight;
    }

    document.getElementById("startBtn").addEventListener("click", async () => {
      renderStatus({ running: true, healthy: false });
      renderStatus(await window.fcdl.start());
    });

    document.getElementById("stopBtn").addEventListener("click", async () => {
      renderStatus(await window.fcdl.stop());
    });

    logButton.addEventListener("click", () => {
      logPanel.classList.toggle("open");
    });

    window.fcdl.onStatus(renderStatus);
    window.fcdl.onLog(appendLog);
    window.fcdl.status().then(renderStatus);
  </script>
</body>
</html>
